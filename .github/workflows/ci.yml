name: Poset Research Pipeline CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set Up Python 3.12 Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Combinatorial Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install numpy networkx joblib matplotlib pytest

    - name: Execute Complete Test Engine Suite
      run: |
        python -m pytest -v tests/

    - name: Run Global Theorem Enumerate Logger Check
      run: |
        python verify_ops.py

    - name: Run Latency Scaling Benchmark Check
      run: |
        python benchmark_poset.py
